version: '3.8'

services:
  backend:
    build: ./backend
    container_name: insight-backend
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  frontend:
    build: ./frontend
    container_name: insight-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
